name: Docs or Low-Risk Contribution
description: Propose or track a docs-first / Z3-first contribution.
title: "[docs] "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Use this form for docs-first or other additive contributions that should stay in preferred contribution zones unless explicitly justified.
  - type: textarea
    id: summary
    attributes:
      label: Change summary
      description: What do you want to change, and why?
      placeholder: Describe the contribution goal.
    validations:
      required: true
  - type: dropdown
    id: touched_zones
    attributes:
      label: Touched zones
      description: Select every zone you expect to touch.
      multiple: true
      options:
        - Z0 Frozen Control Plane
        - Z1 Guarded Governance and Policy Surface
        - Z2 Guarded Mirror, Fixture, Provenance, and Compliance Surface
        - Z3 Preferred Contribution Zones
    validations:
      required: true
  - type: dropdown
    id: frozen_guarded
    attributes:
      label: Frozen / guarded area touched?
      options:
        - No, this should stay in Z3
        - Yes, Z1 touched
        - Yes, Z2 touched
        - Yes, Z0 touched
    validations:
      required: true
  - type: textarea
    id: proof_run
    attributes:
      label: Proof run or proof plan
      description: Declare the commands already run, or the minimum proof you will run before merge.
      placeholder: |
        git diff --check -> pending/pass -> formatting and line endings are clean
        navigation spot-check -> pending/pass -> contributor path remains reachable
    validations:
      required: true
  - type: dropdown
    id: escalation
    attributes:
      label: Escalation needed?
      options:
        - No escalation expected
        - Yes, maintainer review required
        - Yes, plan required before implementation
        - Yes, stop and clarify source-of-truth before implementation
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: Related plan / issue / proof links
      description: Link the governing plan or any related proof/report if already available.
      placeholder: docs/plans/... or issue / PR links
    validations:
      required: false
