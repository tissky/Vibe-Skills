name: Runtime-Affecting or Frozen-Surface Change
description: Track a change that may affect install, check, router, protocol, packaging, or other frozen control-plane behavior.
title: "[runtime] "
labels:
  - runtime
body:
  - type: markdown
    attributes:
      value: |
        This form is for Z0 or otherwise runtime-affecting work. Do not start implementation without a governing plan and a declared proof bundle.
  - type: textarea
    id: summary
    attributes:
      label: Change summary
      placeholder: What runtime behavior may change, and why is it necessary?
    validations:
      required: true
  - type: dropdown
    id: touched_zones
    attributes:
      label: Touched zones
      multiple: true
      options:
        - Z0 Frozen Control Plane
        - Z1 Guarded Governance and Policy Surface
        - Z2 Guarded Mirror, Fixture, Provenance, and Compliance Surface
        - Z3 Preferred Contribution Zones
    validations:
      required: true
  - type: dropdown
    id: frozen_guarded
    attributes:
      label: Frozen / guarded area touched?
      options:
        - Yes, Z0 touched
        - Yes, Z1 touched
        - Yes, Z2 touched
        - No, but runtime behavior is still affected
    validations:
      required: true
  - type: input
    id: plan_link
    attributes:
      label: Governing plan link
      placeholder: docs/plans/....md
    validations:
      required: true
  - type: textarea
    id: proof_run
    attributes:
      label: Baseline / proof bundle declaration
      description: List the baseline and full proof bundle commands that will gate this work.
      placeholder: |
        baseline:
        - scripts/verify/... -> pending/pass -> claim

        full proof bundle:
        - scripts/verify/... -> pending/pass -> claim
        - scripts/verify/... -> pending/pass -> claim
    validations:
      required: true
  - type: checkboxes
    id: stop_ship
    attributes:
      label: Stop-ship acknowledgements
      options:
        - label: I will stop if the governing plan is missing.
          required: true
        - label: I will stop if the required proof bundle is incomplete or red.
          required: true
        - label: I will stop if source-of-truth, mirror, install, or router behavior becomes ambiguous.
          required: true
  - type: dropdown
    id: escalation
    attributes:
      label: Escalation needed?
      options:
        - Yes, maintainer review required
        - Yes, owner review required
        - Yes, blocked on design / plan clarification
        - No additional escalation beyond declared reviewers
    validations:
      required: true
  - type: textarea
    id: escalation_details
    attributes:
      label: Escalation details
      placeholder: State the approval path, reviewers, or blockers.
    validations:
      required: true
