name: Governance or Policy Change
description: Propose a governance, policy, disclosure, or verification-surface change.
title: "[governance] "
labels:
  - governance
body:
  - type: markdown
    attributes:
      value: |
        Use this form when the change touches governance, policy, disclosure, verification, or contributor-facing control surfaces. High-risk changes must be explicit about plan, proof, and escalation.
  - type: textarea
    id: summary
    attributes:
      label: Change summary
      placeholder: What policy or governance surface is changing, and why?
    validations:
      required: true
  - type: dropdown
    id: touched_zones
    attributes:
      label: Touched zones
      multiple: true
      options:
        - Z0 Frozen Control Plane
        - Z1 Guarded Governance and Policy Surface
        - Z2 Guarded Mirror, Fixture, Provenance, and Compliance Surface
        - Z3 Preferred Contribution Zones
    validations:
      required: true
  - type: dropdown
    id: frozen_guarded
    attributes:
      label: Frozen / guarded area touched?
      options:
        - No
        - Yes, Z1 touched
        - Yes, Z2 touched
        - Yes, Z0 touched
    validations:
      required: true
  - type: input
    id: plan_link
    attributes:
      label: Governing plan link
      description: Required when the change is not a trivial additive correction.
      placeholder: docs/plans/....md
    validations:
      required: true
  - type: textarea
    id: proof_run
    attributes:
      label: Required proof run
      description: Declare the gates or checks that already passed, or that must pass before merge.
      placeholder: |
        scripts/verify/... -> pending/pass -> claim
        scripts/verify/... -> pending/pass -> claim
    validations:
      required: true
  - type: checkboxes
    id: stop_ship
    attributes:
      label: Stop-ship acknowledgements
      options:
        - label: I will stop if the change touches frozen / guarded surfaces without matching plan and proof.
          required: true
        - label: I will stop if disclosure, notice, provenance, or source-of-truth paths are unclear.
          required: true
  - type: dropdown
    id: escalation
    attributes:
      label: Escalation needed?
      options:
        - No escalation expected
        - Yes, maintainer review required
        - Yes, owner review required
        - Yes, blocked on plan/proof clarification
    validations:
      required: true
  - type: textarea
    id: escalation_details
    attributes:
      label: Escalation details
      placeholder: What needs approval, clarification, or owner decision?
    validations:
      required: true
